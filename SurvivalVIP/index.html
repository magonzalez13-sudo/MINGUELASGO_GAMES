<script>
const ZONES = [
  {
    name:"📍 PLAYA",
    options:[
      { txt:"🌊 Buscar cocos", fn:s=>{
        if(Math.random()<0.75){ s.sed+=25; s.inv.comida++; return {msg:"Cocos +25💧 +1🍖",cls:"good"};}
        return {msg:"Nada",cls:"neutral"};
      }},
      { txt:"🪵 Madera", fn:s=>{s.inv.madera+=3; return {msg:"+3 madera",cls:"good"};}},
      { txt:"🐟 Pescar", fn:s=>{
        let r=Math.random();
        if(r<0.5){ s.inv.comida+=2; return {msg:"+2 pescado",cls:"good"};}
        if(r<0.7){ return {msg:"Nada",cls:"neutral"};}
        s.hp-=10; return {msg:"Te mordió algo -10HP",cls:"bad"};
      }},
      { txt:"🏃 Selva", fn:s=>{s.zone=1; return {msg:"Selva...",cls:"neutral"};}},
    ]
  },
  {
    name:"🌿 SELVA",
    options:[
      { txt:"🍄 Comer", fn:s=>{
        let r=Math.random();
        if(r<0.6){ s.inv.comida+=2; return {msg:"+2 comida",cls:"good"};}
        s.hp-=15; return {msg:"Venenoso -15HP",cls:"bad"};
      }},
      { txt:"🪵 Cortar", fn:s=>{s.inv.madera+=5; return {msg:"+5 madera",cls:"good"};}},
      { txt:"💧 Río", fn:s=>{
        if(Math.random()<0.7){ s.sed+=30; return {msg:"+30💧",cls:"good"};}
        return {msg:"Seco",cls:"neutral"};
      }},
      { txt:"🗡️ Lanza", fn:s=>{
        if(s.inv.madera>=3){ s.inv.madera-=3; s.inv.lanza=true; return {msg:"Lanza creada",cls:"good"};}
        return {msg:"Falta madera",cls:"bad"};
      }},
      { txt:"⛰️ Montaña", fn:s=>{s.zone=2; return {msg:"Montaña...",cls:"neutral"};}},
    ]
  },
  {
    name:"⛰️ MONTAÑA",
    options:[
      { txt:"🦌 Cazar", fn:s=>{
        if(s.inv.lanza){ s.inv.comida+=4; return {msg:"Caza +4🍖",cls:"good"};}
        s.hp-=20; return {msg:"Sin arma -20HP",cls:"bad"};
      }},
      { txt:"🌧️ Agua lluvia", fn:s=>{s.sed+=25; return {msg:"+25💧",cls:"good"};}},
      { txt:"🔥 Hogera", fn:s=>{s.hp+=15; return {msg:"+15HP",cls:"good"};}},
      { txt:"📡 Señal", fn:s=>{
        if(Math.random()<0.2 && s.dia>6){ s.win=true; return {msg:"🚢 RESCATE",cls:"good"};}
        return {msg:"Nada",cls:"neutral"};
      }},
      { txt:"🌵 Desierto", fn:s=>{s.zone=3; return {msg:"Desierto...",cls:"neutral"};}},
    ]
  },
  {
    name:"🌵 DESIERTO",
    options:[
      { txt:"🏜️ Oasis", fn:s=>{
        if(Math.random()<0.4){ s.sed=100; return {msg:"Oasis 💧 FULL",cls:"good"};}
        s.hp-=15; return {msg:"Calor -15HP",cls:"bad"};
      }},
      { txt:"🪨 Ruinas", fn:s=>{
        if(Math.random()<0.5){ s.inv.madera+=7; return {msg:"+7 loot",cls:"good"};}
        return {msg:"Nada",cls:"neutral"};
      }},
      { txt:"🔙 Volver", fn:s=>{s.zone=2; return {msg:"Regreso",cls:"neutral"};}},
    ]
  }
];

/* 🌦️ CLIMA */
const WEATHER = ["☀️ Soleado","🌧️ Lluvia","⛈️ Tormenta"];

let state;

function resetGame(){
  state={
    dia:1,
    hp:100,
    hambre:100,
    sed:100,
    zone:0,
    weather:0,
    inv:{madera:0,comida:2,agua:2,lanza:false},
    enemies:null
  };
  updateRank();
  render();
}

function rollWeather(){
  state.weather = Math.floor(Math.random()*3);

  if(state.weather===1){ state.sed+=5; }
  if(state.weather===2){ state.hp-=5; }
}

/* 👾 ENEMIGOS */
function spawnEnemy(){
  if(Math.random()<0.25){
    state.enemies = {hp:30 + Math.random()*30};
  }
}

function combat(){
  if(!state.enemies) return;

  if(state.inv.lanza){
    state.enemies.hp -= 25;
  } else {
    state.enemies.hp -= 10;
    state.hp -= 10;
  }

  if(state.enemies.hp<=0){
    state.enemies=null;
  }
}

/* 🏆 RANKING */
function updateRank(){
  let best = localStorage.getItem("survival_best") || 0;
  if(state.dia>best){
    localStorage.setItem("survival_best",state.dia);
  }
}

function renderRank(){
  return localStorage.getItem("survival_best") || 0;
}

function render(){
  const z=ZONES[state.zone];

  document.getElementById("zoneName").textContent =
    z.name + " | " + WEATHER[state.weather] +
    (state.enemies ? " ⚠️ ENEMIGO" : "");

  const o=document.getElementById("options");
  o.innerHTML="";

  z.options.forEach(opt=>{
    let b=document.createElement("button");
    b.className="opt-btn";
    b.textContent=opt.txt;
    b.onclick=()=>act(opt.fn(state));
    o.appendChild(b);
  });

  document.getElementById("log").innerHTML=
  `Día ${state.dia} | HP ${state.hp} | 🍖 ${state.inv.comida} | 💧 ${state.sed} | 🏆 Best: ${renderRank()}`;
}

function act(res){

  rollWeather();
  spawnEnemy();

  combat();

  state.dia++;
  state.hp-=Math.random()*6;
  state.sed-=10;
  state.hambre-=8;

  if(state.enemies && state.enemies.hp<=0){
    state.enemies=null;
  }

  if(state.hp<=0) return end(false);
  if(state.win) return end(true);

  document.getElementById("log").innerHTML=res.msg;
  updateRank();
  render();
}

function end(win){
  updateRank();
  document.getElementById("overlay").classList.add("show");
  document.getElementById("oTitle").textContent=win?"VICTORIA":"MUERTO";
  document.getElementById("oMsg").textContent=
  "Días: "+state.dia+" | Mejor récord: "+renderRank();
}

resetGame();
</script>
