<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Life Simulator - Mejorado</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --primary:#ff6b6b;
    --secondary:#4ecdc4;
    --accent:#ffe66d;
    --dark:#2c3e50;
    --light:#ecf0f1;
    --bg-dark:#1a1a2e;
}

body{
    font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;
    background:linear-gradient(135deg,#1a1a2e,#16213e);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    color:var(--dark);
}

.container{
    width:100%;
    max-width:1100px;
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 20px 60px rgba(0,0,0,.35);
}

.header{
    background:linear-gradient(135deg,var(--primary),#ff8e72);
    color:white;
    padding:30px;
    text-align:center;
}

.header h1{
    font-size:2.5rem;
    margin-bottom:10px;
}

.content{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:25px;
    padding:25px;
}

.card{
    background:linear-gradient(135deg,#ffffff,#f5f7fa);
    border-radius:18px;
    padding:25px;
    box-shadow:0 8px 25px rgba(0,0,0,.08);
}

.character{
    text-align:center;
}

.avatar{
    width:150px;
    height:150px;
    border-radius:50%;
    margin:auto;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:4rem;
    background:linear-gradient(135deg,var(--secondary),#3db8b0);
    box-shadow:0 10px 25px rgba(78,205,196,.35);
    animation:float 3s ease-in-out infinite;
}

.character-name{
    font-size:2rem;
    margin-top:20px;
    color:var(--primary);
    font-weight:bold;
}

.mood{
    margin-top:15px;
    padding:12px;
    border-radius:12px;
    background:#fff0f0;
    font-weight:bold;
}

.level-box{
    margin-top:20px;
    background:#edf2f7;
    border-radius:12px;
    padding:15px;
}

.stat{
    margin-bottom:18px;
}

.stat-label{
    display:flex;
    justify-content:space-between;
    margin-bottom:8px;
    font-weight:bold;
}

.bar{
    height:14px;
    background:#ddd;
    border-radius:20px;
    overflow:hidden;
}

.fill{
    height:100%;
    width:50%;
    border-radius:20px;
    transition:.4s;
}

.actions{
    grid-column:1/-1;
}

.actions-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:15px;
    margin-top:20px;
}

button{
    border:none;
    padding:15px;
    border-radius:14px;
    cursor:pointer;
    font-weight:bold;
    transition:.2s;
    color:white;
    font-size:1rem;
}

button:hover{
    transform:translateY(-3px);
}

button:active{
    transform:scale(.97);
}

.primary{
    background:linear-gradient(135deg,var(--primary),#ff8e72);
}

.secondary{
    background:linear-gradient(135deg,var(--secondary),#3db8b0);
}

.accent{
    background:linear-gradient(135deg,var(--accent),#ffd93d);
    color:#333;
}

.time{
    text-align:center;
    font-size:1.3rem;
    font-weight:bold;
}

.summary{
    margin-top:20px;
    background:#fff4c2;
    padding:18px;
    border-radius:14px;
    font-weight:bold;
    text-align:center;
}

.notification{
    position:fixed;
    top:20px;
    right:20px;
    background:var(--primary);
    color:white;
    padding:15px 20px;
    border-radius:12px;
    animation:slideIn .3s ease;
    z-index:999;
}

.log{
    margin-top:20px;
    max-height:180px;
    overflow-y:auto;
    background:#f7f7f7;
    border-radius:12px;
    padding:10px;
    font-size:.9rem;
}

.log div{
    margin-bottom:8px;
    padding-bottom:5px;
    border-bottom:1px solid #ddd;
}

@keyframes slideIn{
    from{
        transform:translateX(300px);
        opacity:0;
    }
    to{
        transform:translateX(0);
        opacity:1;
    }
}

@keyframes float{
    0%,100%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-10px);
    }
}

@media(max-width:768px){
    .content{
        grid-template-columns:1fr;
    }

    .header h1{
        font-size:1.8rem;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>🏠 The Life Simulator</h1>
        <p>Versión mejorada y sin bugs</p>
    </div>

    <div class="content">

        <div class="card character">

            <div class="avatar" id="avatar">😊</div>

            <div class="character-name" id="characterName">
                Nati
            </div>

            <div class="mood" id="mood">
                Se siente feliz
            </div>

            <div class="level-box">
                ⭐ Nivel: <span id="level">1</span><br><br>

                EXP:
                <div class="bar">
                    <div class="fill" id="xpBar"
                    style="width:0%; background:linear-gradient(90deg,#8e44ad,#9b59b6)">
                    </div>
                </div>
            </div>

        </div>

        <div class="card">

            <h2>📊 Estadísticas</h2>

            <br>

            <div class="stat">
                <div class="stat-label">
                    <span>🍔 Hambre</span>
                    <span id="hungerText">50</span>
                </div>
                <div class="bar">
                    <div class="fill" id="hungerBar"
                    style="background:#ff7675"></div>
                </div>
            </div>

            <div class="stat">
                <div class="stat-label">
                    <span>⚡ Energía</span>
                    <span id="energyText">70</span>
                </div>
                <div class="bar">
                    <div class="fill" id="energyBar"
                    style="background:#74b9ff"></div>
                </div>
            </div>

            <div class="stat">
                <div class="stat-label">
                    <span>🎮 Diversión</span>
                    <span id="funText">40</span>
                </div>
                <div class="bar">
                    <div class="fill" id="funBar"
                    style="background:#55efc4"></div>
                </div>
            </div>

            <div class="stat">
                <div class="stat-label">
                    <span>💰 Dinero</span>
                    <span id="moneyText">500</span>
                </div>
                <div class="bar">
                    <div class="fill" id="moneyBar"
                    style="background:#ffeaa7"></div>
                </div>
            </div>

            <div class="stat">
                <div class="stat-label">
                    <span>❤️ Salud</span>
                    <span id="healthText">80</span>
                </div>
                <div class="bar">
                    <div class="fill" id="healthBar"
                    style="background:#ff4757"></div>
                </div>
            </div>

        </div>

        <div class="card actions">

            <div class="time">
                🕒 <span id="time">08:00</span> - Día <span id="day">1</span>
            </div>

            <div class="actions-grid">

                <button class="primary" onclick="doAction('eat')">
                    🍔 Comer
                </button>

                <button class="primary" onclick="doAction('sleep')">
                    😴 Dormir
                </button>

                <button class="secondary" onclick="doAction('play')">
                    🎮 Jugar
                </button>

                <button class="secondary" onclick="doAction('work')">
                    💼 Trabajar
                </button>

                <button class="accent" onclick="doAction('shower')">
                    🚿 Ducha
                </button>

                <button class="accent" onclick="doAction('relax')">
                    ☕ Relajarse
                </button>

            </div>

            <div class="summary" id="summary">
                Todo va genial ✨
            </div>

            <div class="log" id="log">
            </div>

        </div>

    </div>

</div>

<script>

const game = {

    stats:{
        hunger:50,
        energy:70,
        fun:40,
        money:500,
        health:80
    },

    level:1,
    xp:0,

    time:{
        hour:8,
        day:1
    }

};

const actions = {

    eat:{
        hunger:-35,
        energy:+5,
        fun:+5,
        money:-15,
        health:+5,
        xp:10,
        text:"🍔 Comiste una buena comida"
    },

    sleep:{
        hunger:+15,
        energy:+45,
        fun:+5,
        money:0,
        health:+10,
        xp:8,
        text:"😴 Dormiste muy bien"
    },

    play:{
        hunger:+10,
        energy:-10,
        fun:+30,
        money:-5,
        health:+2,
        xp:12,
        text:"🎮 Te divertiste muchísimo"
    },

    work:{
        hunger:+20,
        energy:-20,
        fun:-10,
        money:+120,
        health:-5,
        xp:18,
        text:"💼 Ganaste dinero trabajando"
    },

    shower:{
        hunger:0,
        energy:+5,
        fun:+10,
        money:0,
        health:+12,
        xp:5,
        text:"🚿 Te sientes limpio"
    },

    relax:{
        hunger:+5,
        energy:+15,
        fun:+15,
        money:0,
        health:+5,
        xp:7,
        text:"☕ Momento relax"
    }

};

function clamp(value,min,max){
    return Math.max(min,Math.min(max,value));
}

function addLog(text){

    const log = document.getElementById("log");

    const item = document.createElement("div");

    item.textContent =
    `[Día ${game.time.day} ${String(game.time.hour).padStart(2,"0")}:00] ${text}`;

    log.prepend(item);

    if(log.children.length > 12){
        log.removeChild(log.lastChild);
    }
}

function gainXP(amount){

    game.xp += amount;

    const needed = game.level * 100;

    if(game.xp >= needed){

        game.xp -= needed;
        game.level++;

        notify(`⭐ ¡Subiste al nivel ${game.level}!`);
    }
}

function doAction(type){

    const a = actions[type];

    if(game.stats.energy <= 5 && type !== "sleep"){
        notify("⚠️ Estás demasiado cansado");
        return;
    }

    if(game.stats.money <= 0 && (type === "eat" || type === "play")){
        notify("💸 No tienes suficiente dinero");
        return;
    }

    Object.keys(game.stats).forEach(stat=>{

        if(a[stat] !== undefined){

            game.stats[stat] += a[stat];

        }

    });

    Object.keys(game.stats).forEach(stat=>{

        if(stat !== "money"){
            game.stats[stat] = clamp(game.stats[stat],0,100);
        }else{
            game.stats[stat] = Math.max(0,game.stats[stat]);
        }

    });

    gainXP(a.xp);

    advanceTime();

    notify(a.text);

    addLog(a.text);

    updateUI();
}

function advanceTime(){

    game.time.hour += Math.floor(Math.random()*3)+1;

    if(game.time.hour >= 24){

        game.time.hour -= 24;
        game.time.day++;

        // desgaste diario
        game.stats.hunger += 10;
        game.stats.energy -= 10;
        game.stats.fun -= 5;

    }
}

function updateUI(){

    updateBar("hunger",game.stats.hunger);
    updateBar("energy",game.stats.energy);
    updateBar("fun",game.stats.fun);
    updateBar("health",game.stats.health);

    document.getElementById("moneyText").textContent =
    game.stats.money;

    document.getElementById("moneyBar").style.width =
    clamp(game.stats.money/10,0,100) + "%";

    document.getElementById("level").textContent =
    game.level;

    document.getElementById("xpBar").style.width =
    (game.xp / (game.level*100))*100 + "%";

    document.getElementById("time").textContent =
    String(game.time.hour).padStart(2,"0")+":00";

    document.getElementById("day").textContent =
    game.time.day;

    updateMood();
    updateSummary();

    saveGame();
}

function updateBar(name,value){

    document.getElementById(name+"Text").textContent =
    Math.round(value);

    document.getElementById(name+"Bar").style.width =
    value + "%";
}

function updateMood(){

    let mood = "😊 Feliz";

    if(game.stats.health < 30 || game.stats.energy < 20){
        mood = "😫 Exhausto";
    }
    else if(game.stats.fun < 20){
        mood = "😐 Aburrido";
    }
    else if(game.stats.hunger > 80){
        mood = "🤤 Hambriento";
    }
    else if(
        game.stats.fun > 80 &&
        game.stats.energy > 70
    ){
        mood = "🤩 Increíble";
    }

    document.getElementById("mood").textContent =
    "Estado: " + mood;

    document.getElementById("avatar").textContent =
    mood.split(" ")[0];
}

function updateSummary(){

    let text = "✨ Todo va bien";

    if(game.stats.health < 25){
        text = "⚠️ Tu salud es baja";
    }
    else if(game.stats.energy < 20){
        text = "😴 Necesitas dormir";
    }
    else if(game.stats.hunger > 75){
        text = "🍔 Tienes mucha hambre";
    }
    else if(game.stats.money < 30){
        text = "💸 Necesitas dinero";
    }

    document.getElementById("summary").textContent = text;
}

function notify(text){

    const n = document.createElement("div");

    n.className = "notification";
    n.textContent = text;

    document.body.appendChild(n);

    setTimeout(()=>{
        n.remove();
    },2500);
}

function passiveDecay(){

    game.stats.hunger += 0.15;
    game.stats.energy -= 0.08;
    game.stats.fun -= 0.05;

    game.stats.hunger = clamp(game.stats.hunger,0,100);
    game.stats.energy = clamp(game.stats.energy,0,100);
    game.stats.fun = clamp(game.stats.fun,0,100);

    // daño por necesidades malas
    if(game.stats.hunger >= 95 || game.stats.energy <= 5){
        game.stats.health -= 0.2;
    }

    game.stats.health =
    clamp(game.stats.health,0,100);

    updateUI();
}

function saveGame(){

    localStorage.setItem(
        "lifeSimulatorSave",
        JSON.stringify(game)
    );
}

function loadGame(){

    const save =
    localStorage.getItem("lifeSimulatorSave");

    if(save){

        const data = JSON.parse(save);

        Object.assign(game,data);

    }
}

loadGame();

updateUI();

setInterval(passiveDecay,1000);

</script>

</body>
</html>
