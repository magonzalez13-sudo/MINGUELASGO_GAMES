<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CAOS SKINS - Juego Extremo</title>
<style>
    body {
        margin: 0;
        padding: 0;
        background: #000;
        color: #0ff;
        font-family: 'Courier New', monospace;
        overflow: hidden;
        text-align: center;
    }
    canvas {
        border: 2px solid #0ff;
        box-shadow: 0 0 30px #0ff;
        image-rendering: pixelated;
    }
    #shopMenu {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0,0,0,0.95);
        border: 3px solid #ff00ff;
        padding: 20px;
        width: 90%;
        max-width: 800px;
        display: none;
        flex-wrap: wrap;
        gap: 15px;
        justify-content: center;
        box-shadow: 0 0 40px #ff00ff;
    }
    .shop-item {
        background: #111;
        border: 2px solid #0ff;
        padding: 10px;
        width: 140px;
        text-align: center;
        transition: all 0.3s;
    }
    .shop-item:hover {
        transform: scale(1.1);
        box-shadow: 0 0 20px #0ff;
    }
    .skin-preview {
        width: 100px;
        height: 100px;
        margin: 10px auto;
        border: 2px solid #fff;
    }
    button {
        background: #ff00ff;
        color: white;
        border: none;
        padding: 8px 15px;
        cursor: pointer;
        font-weight: bold;
    }
    button:hover { background: #00ffff; color: black; }
    .close-btn {
        width: 100%;
        margin-top: 20px;
        padding: 15px;
        font-size: 18px;
    }
    #ui {
        position: absolute;
        top: 10px;
        left: 10px;
        color: #0ff;
        text-shadow: 0 0 10px #0ff;
        pointer-events: none;
    }
    #modifierName {
        position: absolute;
        top: 60px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 28px;
        font-weight: bold;
        text-shadow: 0 0 15px #f00;
    }
</style>
</head>
<body>

<canvas id="canvas" width="800" height="600"></canvas>

<div id="ui">
    <div>Puntuación: <span id="score">0</span></div>
    <div>Nivel: <span id="level">1</span></div>
    <div>Monedas: <span id="coins">0</span></div>
    <div>XP: <span id="xp">0</span>/100</div>
</div>
<div id="modifierName"></div>

<div id="shopMenu"></div>

<script>
// ======================== DATOS ========================
const skinData = {
    cyan: { color:"#00ffcc", glow:"#00ffcc", price:0 },
    inferno: { color:"#ff0055", glow:"#ff2255", price:25 },
    gold: { color:"#ffd700", glow:"#ffee00", price:50 },
    void: { color:"#7a00ff", glow:"#bb66ff", price:80 },
    matrix: { color:"#00ff00", glow:"#66ff66", price:120 },
    blood: { color:"#990000", glow:"#ff0000", price:140 },
    ocean: { color:"#0088ff", glow:"#00ccff", price:160 },
    toxic: { color:"#99ff00", glow:"#ccff00", price:180 },
    galaxy: { color:"#6633ff", glow:"#9966ff", price:220 },
    lava: { color:"#ff4400", glow:"#ff8800", price:260 },
    diamond: { color:"#8be9fd", glow:"#ffffff", price:320 },
    glitch: { color:"#ff00ff", glow:"#00ffff", price:400 },
    shadow: { color:"#111111", glow:"#666666", price:450 },
    rainbow: { color:"rainbow", glow:"#ffffff", price:600 },
    godmode: { color:"#ffffff", glow:"#ffd700", price:1000 },
    cursed: { color:"#550000", glow:"#ff0000", price:1300 },
    cyber: { color:"#00ffff", glow:"#00ffff", price:1600 },
    plasma: { color:"#ff00aa", glow:"#ff55cc", price:2000 },
    ice: { color:"#88e0ff", glow:"#ccffff", price:2300 },
    darkmatter:{ color:"#220022", glow:"#aa00ff", price:3000 }
};

// ======================== VARIABLES ========================
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const shopContainer = document.getElementById("shopMenu");

let player = { x: 380, y: 500, w: 40, h: 40, speed: 8 };
let enemy = { x: 300, y: -50, w: 50, h: 50, speed: 5, speedMultiplier: 1 };

let score = 0;
let level = 1;
let xp = 0;
let coins = parseInt(localStorage.getItem("bd_coins")) || 500;
let currentSkin = "cyan";
let ownedSkins = ["cyan"];
let currentModifier = null;
let reverseControls = false;
let gameOver = false;
let rainbowHue = 0;
let keys = {};

// ======================== TIENDA ========================
function generateShop() {
    shopContainer.innerHTML = `<h2 style="width:100%; color:#ff00ff;">TIENDA EXTREMA</h2>`;
    
    for (let skin in skinData) {
        const data = skinData[skin];
        const div = document.createElement("div");
        div.className = "shop-item";
        
        const isOwned = ownedSkins.includes(skin);
        
        div.innerHTML = `
            <div class="skin-preview" style="
                background: ${data.color === "rainbow" 
                    ? "linear-gradient(45deg,red,orange,yellow,lime,cyan,blue,purple)" 
                    : data.color};
                box-shadow: 0 0 25px ${data.glow};
            "></div>
            <b>${skin.toUpperCase()}</b><br>
            ${data.price} monedas<br>
            <button onclick="${isOwned ? `equipSkin('${skin}')` : `buySkin('${skin}', ${data.price})`}">
                ${isOwned ? "EQUIPAR" : "COMPRAR"}
            </button>
        `;
        shopContainer.appendChild(div);
    }

    const closeBtn = document.createElement("button");
    closeBtn.className = "close-btn";
    closeBtn.innerText = "CERRAR TIENDA";
    closeBtn.onclick = () => shopContainer.style.display = "none";
    shopContainer.appendChild(closeBtn);
}

function buySkin(skin, price) {
    if (coins >= price) {
        coins -= price;
        ownedSkins.push(skin);
        localStorage.setItem("bd_coins", coins);
        updateUI();
        generateShop();
        alert(`¡Compraste ${skin.toUpperCase()}!`);
    } else {
        alert("¡No tienes suficientes monedas!");
    }
}

function equipSkin(skin) {
    currentSkin = skin;
    alert(`¡Equipaste ${skin.toUpperCase()}!`);
}

// ======================== MODIFICADORES ========================
const modifiers = [
    { name: "NORMAL", apply: () => { enemy.speedMultiplier = 1; player.speed = 8; canvas.style.transform = "rotate(0deg)"; } },
    { name: "TURBO HELL", apply: () => enemy.speedMultiplier = 3 },
    { name: "SLOW MOTION", apply: () => enemy.speedMultiplier = 0.5 },
    { name: "MICRO PLAYER", apply: () => { player.w = 20; player.h = 20; } },
    { name: "MEGA PLAYER", apply: () => { player.w = 70; player.h = 70; } },
    { name: "EARTHQUAKE", apply: () => canvas.style.transform = `translate(${Math.random()*12-6}px, ${Math.random()*12-6}px)` },
    { name: "REVERSE CONTROLS", apply: () => reverseControls = true },
    { name: "HYPER SPEED", apply: () => player.speed = 15 },
    { name: "DARKNESS", apply: () => {} },
    { name: "FLASHBANG", apply: () => document.body.style.filter = `brightness(${1 + Math.random()*2})` },
    { name: "SPINNING SCREEN", apply: () => {} },
    { name: "CHAOS MODE", apply: () => {
        enemy.speedMultiplier = 1 + Math.random()*4;
        player.speed = 5 + Math.random()*10;
    }}
];

// ======================== CONTROLES ========================
window.addEventListener("keydown", e => keys[e.key] = true);
window.addEventListener("keyup", e => keys[e.key] = false);

function movePlayer() {
    let left = keys["ArrowLeft"] || keys["a"] || keys["A"];
    let right = keys["ArrowRight"] || keys["d"] || keys["D"];

    if (reverseControls) [left, right] = [right, left];

    if (left) player.x -= player.speed;
    if (right) player.x += player.speed;

    if (player.x < 0) player.x = 0;
    if (player.x > canvas.width - player.w) player.x = canvas.width - player.w;
}

// ======================== DIBUJO ========================
function drawPlayer() {
    let skin = skinData[currentSkin];
    let color = skin.color;

    if (color === "rainbow") {
        rainbowHue += 4;
        color = `hsl(${rainbowHue % 360}, 100%, 50%)`;
    }

    if (currentSkin === "glitch") {
        player.x += Math.random() * 4 - 2;
        player.y += Math.random() * 2 - 1;
    }

    ctx.shadowBlur = (currentSkin === "godmode") ? 50 : 25;
    ctx.shadowColor = skin.glow;
    ctx.fillStyle = color;
    ctx.fillRect(player.x, player.y, player.w, player.h);
}

function drawEnemy() {
    ctx.shadowBlur = 20;
    ctx.shadowColor = "#ff0000";
    ctx.fillStyle = "#ff0000";
    ctx.fillRect(enemy.x, enemy.y, enemy.w, enemy.h);
}

function draw() {
    ctx.fillStyle = "rgba(0,0,0,0.15)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    drawPlayer();
    drawEnemy();
}

// ======================== LÓGICA ========================
function moveEnemy() {
    enemy.y += enemy.speed * enemy.speedMultiplier;

    if (score > 50) {
        enemy.x += Math.sin(Date.now() / 100) * 5;
    }

    if (enemy.y > canvas.height) {
        enemy.y = -50;
        enemy.x = Math.random() * (canvas.width - enemy.w);
        score++;
        xp += 8;

        if (score % 5 === 0) {
            // Reset previo
            reverseControls = false;
            player.w = 40;
            player.h = 40;
            canvas.style.transform = "";
            document.body.style.filter = "";

            currentModifier = modifiers[Math.floor(Math.random() * modifiers.length)];
            document.getElementById("modifierName").textContent = currentModifier.name;
            currentModifier.apply();
        }

        if (xp >= 100) {
            xp = 0;
            level++;
        }
        updateUI();
    }
}

function checkCollision() {
    if (
        player.x < enemy.x + enemy.w &&
        player.x + player.w > enemy.x &&
        player.y < enemy.y + enemy.h &&
        player.y + player.h > enemy.y
    ) {
        endGame();
    }
}

function updateUI() {
    document.getElementById("score").textContent = score;
    document.getElementById("level").textContent = level;
    document.getElementById("coins").textContent = coins;
    document.getElementById("xp").textContent = xp;
}

function endGame() {
    gameOver = true;
    let reward = Math.floor(score * 1.5);
    if (score >= 100) reward += 500;
    if (score >= 200) reward += 1500;

    coins += reward;
    localStorage.setItem("bd_coins", coins);

    alert(`¡GAME OVER!\nPuntuación: ${score}\nRecompensa: +${reward} monedas`);
    location.reload();
}

// ======================== BUCLE PRINCIPAL ========================
function gameLoop() {
    if (gameOver) return;
    movePlayer();
    moveEnemy();
    checkCollision();
    draw();
    requestAnimationFrame(gameLoop);
}

// ======================== INICIO ========================
updateUI();
generateShop();
gameLoop();

// Abrir tienda con tecla "T"
document.addEventListener("keydown", e => {
    if (e.key.toLowerCase() === "t") {
        shopContainer.style.display = shopContainer.style.display === "flex" ? "none" : "flex";
        if (shopContainer.style.display === "flex") generateShop();
    }
});
</script>

<p style="color:#0ff; margin-top:10px;">Presiona <b>T</b> para abrir la tienda</p>

</body>
</html>
