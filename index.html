<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MINGUELASGO JUEGOS</title>
    <style>
        body { 
            background: #0f0f0f; 
            color: #00ffcc; 
            font-family: 'Arial', sans-serif; 
            text-align: center; 
            margin: 0;
            padding: 20px;
        }

        /* SECCIÓN VIP ESTILO DAVO */
        .vip-banner {
            max-width: 650px;
            margin: 20px auto 40px;
            padding: 20px;
            background: rgba(255, 215, 0, 0.05);
            border: 2px solid #ffd700;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        
        .vip-banner input {
            background: #000;
            border: 1px solid #ffd700;
            color: #ffd700;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
        }

        .vip-banner button {
            background: #ffd700;
            color: #000;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .vip-banner button:hover {
            box-shadow: 0 0 15px #ffd700;
            transform: scale(1.05);
        }

        /* CONTENEDOR DE JUEGOS */
        .container { 
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .game-card { 
            width: 280px; 
            padding: 20px; 
            margin: 15px;
            background: #1a1a1a; 
            border: 2px solid #00ffcc; 
            border-radius: 15px;
            transition: 0.3s;
        }

        .game-img { width: 100%; height: 140px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; }
        
        h1 { font-size: 3em; text-shadow: 0 0 15px #00ffcc; margin-bottom: 10px; }
        h3 { color: #fff; margin-bottom: 10px; }
        
        .play-btn { background: #00ffcc; color: #000; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <h1>🎮 MINGUELASGO JUEGOS</h1>

    <!-- BANNER VIP -->
    <div class="vip-banner" id="vipSection">
        <div id="vip-locked" style="display: flex; align-items: center; gap: 15px;">
            <span style="color: #ffd700; font-weight: bold; letter-spacing: 1px;">⭐ ACCESO VIP:</span>
            <input type="password" id="vipPass" placeholder="Código">
            <button onclick="checkVip()">ENTRAR</button>
        </div>
        
        <div id="vip-unlocked" style="display: none; width: 100%; text-align: center;">
            <span style="color: #ffd700; font-weight: bold; margin-right: 20px;">✅ BIENVENIDO MINGUELASGO VIP</span>
            <button onclick="location.href='vip-extension.html'" style="background: #fff; color: #000;">ABRIR EXTENSIÓN</button>
        </div>
    </div>

    <div class="container">
        <!-- JUEGO 1 -->
        <div class="game-card">
            <img src="https://itch.zone" class="game-img">
            <h3>BLOCK DASH</h3>
            <button class="play-btn" onclick="location.href='BlockDash/index.html'">JUGAR AHORA</button>
        </div>

        <!-- JUEGO 2 -->
        <div class="game-card">
            <img src="https://freepik.com" class="game-img">
            <h3>TU OTRO JUEGO</h3>
            <button class="play-btn" onclick="location.href='OtroJuego/index.html'">JUGAR AHORA</button>
        </div>
    </div>

    <script>
        async function checkVip() {
            const pass = document.getElementById('vipPass').value;
            const encoder = new TextEncoder();
            const data = encoder.encode(pass);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

            // Hash único para la contraseña: M1gu5l R1c0
            const secret = "f9a4613271188402506e987c6742a78f44d84f881923485c2c776080365778b8";

            if (hashHex === secret) {
                document.getElementById('vip-locked').style.display = 'none';
                document.getElementById('vip-unlocked').style.display = 'block';
                document.getElementById('vipSection').style.border = "2px solid #fff";
                document.getElementById('vipSection').style.background = "rgba(0, 255, 204, 0.1)";
            } else {
                alert("Código incorrecto. Preguntale a Migui.");
            }
        }
    </script>
</body>
</html>
