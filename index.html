<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MINGUELASGO JUEGOS</title>
    <style>
        body { background: #0f0f0f; color: #00ffcc; font-family: 'Arial', sans-serif; text-align: center; }
        .container { margin-top: 50px; }
        .game-card { 
            display: inline-block; width: 250px; padding: 20px; margin: 15px;
            background: #1a1a1a; border: 2px solid #00ffcc; border-radius: 15px;
            transition: 0.3s; cursor: pointer;
        }
        .game-card:hover { transform: scale(1.1); box-shadow: 0 0 20px #00ffcc; }
        button { background: #00ffcc; color: black; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🎮 MINGUELASGO JUEGOS 🎮</h1>
    <div class="container">
        <div class="game-card">
            <h3>Mi Primer Juego</h3>
            <p>Próximamente...</p>
            <button onclick="alert('¡Pronto podrás jugar aquí!')">JUGAR</button>
        </div>
    </div>
</body>
</html>
