<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio-Infección Global: Cepa Balanceada</title>
    <style>
        :root {
            --bg-color: #06090e;
            --panel-color: #121824;
            --text-color: #ffc107;
            --adn-color: #00f0ff;
            --infect-color: #ff3838;
            --heal-color: #2ed573;
            --border-color: #232d42;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: #ffffff;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--infect-color);
            margin: 5px 0;
            font-size: 2.2em;
            text-shadow: 0 0 15px rgba(255, 56, 56, 0.5);
            letter-spacing: 1px;
            font-weight: 800;
        }

        .subtitle {
            color: #718096;
            margin-bottom: 15px;
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #pantalla-inicio {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 7, 10, 0.95);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .selector-box {
            background: var(--panel-color);
            border: 2px solid var(--border-color);
            padding: 30px;
            border-radius: 8px;
            text-align: center;
            max-width: 500px;
        }

        .pathogen-btn {
            background: #1a2333;
            border: 1px solid var(--border-color);
            color: white;
            padding: 12px 20px;
            margin: 8px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            width: 80%;
            transition: 0.2s;
        }

        .pathogen-btn:hover {
            border-color: var(--adn-color);
            background: #243147;
        }

        .ticker {
            background: #000000;
            border: 1px solid var(--border-color);
            color: #ffcc00;
            padding: 12px;
            width: 100%;
            max-width: 1200px;
            box-sizing: border-box;
            margin-bottom: 15px;
            border-radius: 6px;
            font-size: 0.9em;
            font-family: monospace;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 12px;
            width: 100%;
            max-width: 1200px;
            margin-bottom: 15px;
        }

        .stat-card {
            background: var(--panel-color);
            padding: 15px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .stat-card.adn { border-top: 4px solid var(--adn-color); }
        .stat-card.inf { border-top: 4px solid var(--infect-color); }
        .stat-card.cur { border-top: 4px solid var(--heal-color); }

        .stat-val {
            font-size: 1.7em;
            font-weight: bold;
            margin-top: 5px;
        }
        .adn .stat-val { color: var(--adn-color); }
        .inf .stat-val { color: var(--infect-color); }
        .cur .stat-val { color: var(--heal-color); }

        .map-container {
            width: 100%;
            max-width: 1200px;
            background: #090d16;
            border: 1px solid var(--border-color);
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .map-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(135px, 1fr));
            gap: 10px;
        }

        .map-node {
            background: #121721;
            border: 1px solid #2d3748;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
            font-size: 0.8em;
            transition: all 0.4s ease;
        }

        .main-container {
            display: grid;
            grid-template-columns: 1fr 450px;
            gap: 15px;
            width: 100%;
            max-width: 1200px;
        }

        @media (max-width: 950px) {
            .main-container { grid-template-columns: 1fr; }
        }

        .panel {
            background-color: var(--panel-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 18px;
        }

        .panel h3 {
            margin-top: 0;
            font-size: 1.2em;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 8px;
            color: #e2e8f0;
        }

        .countries-list {
            max-height: 380px;
            overflow-y: auto;
        }

        .country-row {
            display: flex;
            justify-content: space-between;
            background: #172030;
            padding: 8px 12px;
            margin-top: 6px;
            border-radius: 4px;
            font-size: 0.85em;
        }

        .country-bar {
            height: 4px;
            background: var(--infect-color);
            width: 0%;
            transition: width 0.4s;
            border-radius: 2px;
            margin-top: 2px;
        }

        .tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 15px;
        }

        .tab-btn {
            flex: 1;
            background: #1a2333;
            border: 1px solid var(--border-color);
            color: #a0aec0;
            padding: 10px;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: bold;
            border-radius: 4px;
        }

        .tab-btn.active {
            background: var(--text-color);
            color: #000000;
            border-color: var(--text-color);
        }

        .upgrade-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 380px;
            overflow-y: auto;
        }

        .upgrade-item {
            background: #161f30;
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .upgrade-item.bought {
            border-left: 4px solid var(--heal-color);
            background: #111824;
            opacity: 0.7;
        }

        .upgrade-info h4 {
            margin: 0 0 4px 0;
            font-size: 0.95em;
            color: #ffffff;
        }

        .upgrade-info p {
            margin: 0;
            font-size: 0.8em;
            color: #a0aec0;
            line-height: 1.2;
        }

        .buy-btn {
            background: var(--adn-color);
            color: #000000;
            border: none;
            padding: 10px 14px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.8em;
            min-width: 85px;
        }

        .buy-btn:disabled {
            background: #2d3748;
            color: #718096;
            cursor: not-allowed;
        }

        .control-btn {
            width: 100%;
            padding: 12px;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background: #3182ce;
            color: white;
            margin-top: 15px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

    <div id="pantalla-inicio">
        <div class="selector-box">
            <h2 style="color: var(--infect-color); margin-top:0;">SELECCIONA TU PATÓGENO</h2>
            <button class="pathogen-btn" onclick="seleccionarPatogeno('Bacteria')">🧫 Bacteria (+ADN inicial)</button>
            <button class="pathogen-btn" onclick="seleccionarPatogeno('Virus')">🧬 Virus (Mutaciones automáticas)</button>
            <button class="pathogen-btn" onclick="seleccionarPatogeno('Parásito')">🐛 Parásito (Ocultación OMS)</button>
        </div>
    </div>

    <h1>BIO-INFECCIÓN GLOBAL</h1>
    <div class="subtitle" id="tipoPatogenoTexto">Cargando genoma...</div>

    <div class="ticker" id="newsTicker">Iniciando cepa biológica...</div>

    <div class="stats-grid">
        <div class="stat-card adn">🧬 PUNTOS ADN<div class="stat-val" id="statAdn">12</div></div>
        <div class="stat-card inf">🦠 INFECTADOS VIVOS<div class="stat-val" id="statInfected">1</div></div>
        <div class="stat-card">💀 BAJAS CONFIRMADAS<div class="stat-val" id="statDead" style="color:var(--infect-color);">0</div></div>
        <div class="stat-card cur">🧪 PROGRESO DE LA CURA<div class="stat-val" id="statCura">0%</div></div>
    </div>

    <div class="map-container">
        <div class="map-grid" id="mapGridContainer"></div>
    </div>

    <div class="main-container">
        <div class="panel">
            <h3>🌍 Geo-Análisis Territorial</h3>
            <div class="countries-list" id="countriesContainer"></div>
            <button class="control-btn" id="pauseResumeBtn">⏸️ PAUSAR SIMULACIÓN</button>
        </div>

        <div class="panel">
            <h3>🧬 Ingeniería de Mutación</h3>
            <div class="tabs">
                <button class="tab-btn active" id="tab-trans">Transmisión</button>
                <button class="tab-btn" id="tab-sintoma">Síntomas</button>
                <button class="tab-btn" id="tab-habilidad">Resistencias</button>
            </div>
            <div class="upgrade-list" id="upgradesContainer"></div>
        </div>
    </div>

    <script>
        const paises = [
            { id: "esp", nombre: "España", pob: 47000000, inf: 1, muertos: 0, clima: "templado", rico: true, con: 8 },
            { id: "gbr", nombre: "Reino Unido", pob: 67000000, inf: 0, muertos: 0, clima: "frio", rico: true, con: 9 },
            { id: "rws", nombre: "Rusia", pob: 144000000, inf: 0, muertos: 0, clima: "frio", rico: false, con: 5 },
            { id: "bra", nombre: "Brasil", pob: 214000000, inf: 0, muertos: 0, clima: "calido", rico: false, con: 6 },
            { id: "zaf", nombre: "Sudáfrica", pob: 60000000, inf: 0, muertos: 0, clima: "calido", rico: false, con: 5 },
            { id: "usa", nombre: "EE.UU.", pob: 332000000, inf: 0, muertos: 0, clima: "templado", rico: true, con: 10 },
            { id: "chn", nombre: "China", pob: 1412000000, inf: 0, muertos: 0, clima: "templado", rico: true, con: 9 },
            { id: "grl", nombre: "Groenlandia", pob: 56000, inf: 0, muertos: 0, clima: "frio", rico: true, con: 1 }
        ];

        const mejoras = [
            { id: "t1", cat: "trans", nombre: "Aerosoles I", desc: "Aumenta drásticamente los contagios por aire.", adn: 6, comprado: false },
            { id: "t2", cat: "trans", nombre: "Intercambio Pluvial", desc: "Permite saltar a otros continentes por barcos.", adn: 6, comprado: false },
            { id: "t3", cat: "trans", nombre: "Mutación Aves", desc: "El virus se salta bloqueos fronterizos.", adn: 10, comprado: false },
            
            // CORRECCIÓN: Tos sutil ahora tiene 0 letalidad real
            { id: "s1", cat: "sintoma", nombre: "Tos sutil", desc: "Transmisión limpia y rápida sin letalidad.", adn: 4, comprado: false, letalidad: 0, visibilidad: 2 },
            { id: "s2", cat: "sintoma", nombre: "Quistes Internos", desc: "Provoca bultos. Añade letalidad moderada.", adn: 10, comprado: false, letalidad: 3, visibilidad: 15 },
            { id: "s3", cat: "sintoma", nombre: "Fallo de Órganos", desc: "Letalidad masiva. Paraliza por completo los laboratorios.", adn: 25, comprado: false, letalidad: 30, visibilidad: 75 },
            
            { id: "h1", cat: "habilidad", nombre: "Criadaptación", desc: "Requisito para avanzar eficazmente en zonas frías.", adn: 8, comprado: false },
            { id: "h2", cat: "habilidad", nombre: "Resistencia Química", desc: "Neutraliza las defensas médicas de países ricos.", adn: 12, comprado: false }
        ];

        let adnActual = 12;
        let curaProgreso = 0;
        let curaActiva = false;
        let juegoPausado = false;
        let currentTab = 'trans';
        let tipoPatogeno = 'Bacteria';
        const totalMundial = paises.reduce((acc, p) => acc + p.pob, 0);

        function seleccionarPatogeno(tipo) {
            tipoPatogeno = tipo;
            document.getElementById("pantalla-inicio").style.display = "none";
            document.getElementById("tipoPatogenoTexto").innerText = `Cepa activa: ${tipoPatogeno}`;
            if(tipo === 'Bacteria') adnActual = 24; 
            init();
        }

        function init() {
            renderMapaInicial();
            renderPaises();
            renderMejoras();
            
            document.getElementById("pauseResumeBtn").onclick = togglePausa;
            document.getElementById("tab-trans").onclick = () => switchTab('trans');
            document.getElementById("tab-sintoma").onclick = () => switchTab('sintoma');
            document.getElementById("tab-habilidad").onclick = () => switchTab('habilidad');

            setInterval(bucleJuego, 1000);
        }

        function renderMapaInicial() {
            const container = document.getElementById("mapGridContainer");
            container.innerHTML = "";
            paises.forEach(p => {
                const node = document.createElement("div");
                node.className = "map-node";
                node.id = `map-node-${p.id}`;
                node.innerHTML = `<strong>${p.nombre}</strong><br><span id="map-status-${p.id}">Sano</span>`;
                container.appendChild(node);
            });
        }

        function renderPaises() {
            const container = document.getElementById("countriesContainer");
            container.innerHTML = "";
            paises.forEach(p => {
                let pct = p.pob > 0 ? (((p.inf + p.muertos) / p.pob) * 100).toFixed(2) : 0;
                const row = document.createElement("div");
                row.innerHTML = `
                    <div class="country-row">
                        <span><strong>${p.nombre}</strong> <span style="color:#718096; font-size:0.85em;">(${p.clima})</span></span>
                        <span>🦠 ${formatNum(p.inf)} | 💀 ${formatNum(p.muertos)}</span>
                    </div>
                    <div class="country-bar" style="width: ${Math.min(pct, 100)}%"></div>
                `;
                container.appendChild(row);

                const mapNode = document.getElementById(`map-node-${p.id}`);
                const mapStatus = document.getElementById(`map-status-${p.id}`);
                if (mapNode && mapStatus) {
                    if (p.muertos >= p.pob * 0.995 || (p.inf === 0 && p.muertos > 0 && (p.pob - p.muertos) < 100)) {
                        mapNode.style.background = "#2a0808";
                        mapNode.style.borderColor = "var(--infect-color)";
                        mapStatus.innerText = "🟥 Colapsado";
                        mapStatus.style.color = "var(--infect-color)";
                    } else if (p.inf > 0) {
                        let opacidad = Math.min((p.inf / p.pob) + 0.2, 1);
                        mapNode.style.background = `rgba(229, 62, 62, ${opacidad * 0.4})`;
                        mapNode.style.borderColor = "#e53e3e";
                        mapStatus.innerText = `Infectado ${pct}%`;
                        mapStatus.style.color = "#ff8a8a";
                    } else {
                        mapNode.style.background = "#121721";
                        mapNode.style.borderColor = "#2d3748";
                        mapStatus.innerText = "Sano";
                        mapStatus.style.color = "#718096";
                    }
                }
            });
        }

        function renderMejoras() {
            const container = document.getElementById("upgradesContainer");
            container.innerHTML = "";
            
            const filtradas = mejoras.filter(m => m.cat === currentTab);
            filtradas.forEach(m => {
                const item = document.createElement("div");
                item.className = `upgrade-item ${m.comprado ? 'bought' : ''}`;
                
                item.innerHTML = `
                    <div class="upgrade-info">
                        <h4>${m.nombre}</h4>
                        <p>${m.desc}</p>
                    </div>
                    <button class="buy-btn" ${m.comprado || adnActual < m.adn ? 'disabled' : ''} id="btn-${m.id}">
                        ${m.comprado ? 'MUTADO' : `${m.adn} ADN`}
                    </button>
                `;
                container.appendChild(item);

                const btn = document.getElementById(`btn-${m.id}`);
                if (!m.comprado && adnActual >= m.adn) {
                    btn.onclick = () => comprarMejora(m.id);
                }
            });
        }

        function switchTab(tab) {
            currentTab = tab;
            ['trans', 'sintoma', 'habilidad'].forEach(t => {
                document.getElementById(`tab-${t}`).classList.remove("active");
            });
            document.getElementById(`tab-${tab}`).classList.add("active");
            renderMejoras();
        }

        function comprarMejora(id) {
            const m = mejoras.find(x => x.id === id);
            if (m && adnActual >= m.adn && !m.comprado) {
                adnActual -= m.adn;
                m.comprado = true;
                pushNoticia(`Cepa modificada: ${m.nombre}`);
                renderMejoras();
                renderPaises();
                actualizarInterfazGlobal(0, 0);
            }
        }

        function actualizarInterfazGlobal(totalInf, totalMuertos) {
            document.getElementById("statAdn").innerText = adnActual;
            document.getElementById("statInfected").innerText = formatNum(totalInf);
            document.getElementById("statDead").innerText = formatNum(totalMuertos);
            document.getElementById("statCura").innerText = Math.floor(curaProgreso) + "%";
        }

        function pushNoticia(texto) {
            document.getElementById("newsTicker").innerText = "📡 " + texto;
        }

        function togglePausa() {
            juegoPausado = !juegoPausado;
            document.getElementById("pauseResumeBtn").innerText = juegoPausado ? "▶️ REANUDAR SIMULACIÓN" : "⏸️ PAUSAR SIMULACIÓN";
        }

        function formatNum(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }

        function bucleJuego() {
            if (juegoPausado) return;

            let totalInfectadosGlobal = 0;
            let totalMuertosGlobal = 0;
            let visibilidadTotal = 0;
            let laboratoriosActivos = 0;

            const tAire = mejoras.find(m => m.id === "t1").comprado;
            const tAgua = mejoras.find(m => m.id === "t2").comprado;
            const tAves = mejoras.find(m => m.id === "t3").comprado;
            const sTos = mejoras.find(m => m.id === "s1").comprado;
            const sQuistes = mejoras.find(m => m.id === "s2").comprado;
            const sFallo = mejoras.find(m => m.id === "s3").comprado;
            const hFrio = mejoras.find(m => m.id === "h1").comprado;
            const hFarmacos = mejoras.find(m => m.id === "h2").comprado;

            if (sTos) visibilidadTotal += 2;
            if (sQuistes) visibilidadTotal += 12;
            if (sFallo) visibilidadTotal += 70;

            if (tipoPatogeno === 'Parásito') visibilidadTotal *= 0.50;

            if (tipoPatogeno === 'Virus' && Math.random() < 0.04) {
                let noCompradas = mejoras.filter(m => !m.comprado);
                if(noCompradas.length > 0) {
                    let aleatoria = noCompradas[Math.floor(Math.random() * noCompradas.length)];
                    aleatoria.comprado = true;
                    pushNoticia(`⚠️ MUTACIÓN ESPONTÁNEA: El virus mutó '${aleatoria.nombre}' de forma autónoma.`);
                }
            }

            paises.forEach(p => {
                let sanos = p.pob - (p.inf + p.muertos);

                // Solo si el país retiene supervivientes, sus científicos aportan a la cura
                if (p.muertos < p.pob * 0.99) {
                    laboratoriosActivos++;
                }

                // Infección interna corregida exponencialmente
                if (p.inf > 0 && sanos > 0) {
                    let tasaBase = 0.50; 
                    if (p.clima === "frio" && !hFrio) tasaBase *= 0.20;
                    if (p.rico && !hFarmacos) tasaBase *= 0.15;
                    if (sTos) tasaBase += 0.35;
                    if (sQuistes) tasaBase += 0.45;

                    let infectadosNuevos = Math.ceil(p.inf * tasaBase);
                    if (infectadosNuevos > sanos || sanos < 5000) {
                        infectadosNuevos = sanos; 
                    }
                    
                    p.inf += infectadosNuevos;
                    if (Math.random() < 0.16) adnActual += 1;
                }

                // Letalidad interna regulada (EVITA EL ERROR DE LA CAPTURA)
                if (p.inf > 0) {
                    let factorLetalidad = 0;
                    if (sQuistes) factorLetalidad += 0.02;
                    if (sFallo) factorLetalidad += 0.22;

                    // FRENO DE SEGURIDAD: Si quedan pocos sanos sin infectar, el virus frena el asesinato para no quemar el país
                    if (sanos > 0 && sanos < 100000 && factorLetalidad > 0) {
                        factorLetalidad *= 0.1; 
                    }

                    if (factorLetalidad > 0) {
                        let muertesNuevas = Math.ceil(p.inf * factorLetalidad);
                        
                        // Si los infectados vivos bajan de un umbral crítico, se limpian directamente
                        if (p.inf < 100 || muertesNuevas > p.inf) {
                            muertesNuevas = p.inf;
                        }

                        p.muertos += muertesNuevas;
                        p.inf -= muertesNuevas;
                    }
                }

                if (p.muertos > p.pob) p.muertos = p.pob;

                totalInfectadosGlobal += p.inf;
                totalMuertosGlobal += p.muertos;
            });

            // Expansión internacional fluida
            if (totalInfectadosGlobal > 5) {
                paises.forEach(origen => {
                    if (origen.inf > 300) {
                        paises.forEach(destino => {
                            if (destino.inf === 0 && (destino.pob - destino.muertos) > 0) {
                                let vectorCamino = 0.008; 
                                if (tAire) vectorCamino += 0.05;
                                if (tAgua) vectorCamino += 0.05;
                                if (tAves) vectorCamino += 0.08;

                                if (Math.random() < vectorCamino) {
                                    destino.inf = 15; 
                                    pushNoticia(`✈️ Vector internacional: Infección detectada en ${destino.nombre}.`);
                                    adnActual += 4;
                                }
                            }
                        });
                    }
                });
            }

            // Desarrollo de la Cura
            if (laboratoriosActivos === 0) {
                if (curaActiva) {
                    pushNoticia("🛑 COLAPSO CIENTÍFICO GLOBAL: No quedan laboratorios activos. Desarrollo de la cura congelado.");
                }
            } else if (visibilidadTotal > 8 || totalInfectadosGlobal > (totalMundial * 0.05)) {
                if (!curaActiva) {
                    curaActiva = true;
                    pushNoticia("🚨 ALERTA GLOBAL: La OMS ha catalogado el patógeno e inicia el desarrollo de la cura.");
                }
                
                let factorLaboratorios = laboratoriosActivos / paises.length;
                let avanceCura = (0.14 + (visibilidadTotal * 0.014)) * factorLaboratorios;
                if (sFallo) avanceCura *= 0.4; 
                
                curaProgreso += avanceCura;
            }

            actualizarInterfazGlobal(totalInfectadosGlobal, totalMuertosGlobal);
            renderPaises();
            renderMejoras();

            // REGLAS CLARAS DE FIN DE PARTIDA
            let personasVivasSanas = paises.reduce((acc, p) => acc + (p.pob - (p.inf + p.muertos)), 0);

            // CORRECCIÓN 3: Si no quedan sanos y los infectados son mínimos con laboratorios destruidos, forzar victoria
            if (totalMuertosGlobal >= totalMundial * 0.999 || (personasVivasSanas === 0 && totalInfectadosGlobal < 500 && laboratoriosActivos === 0)) {
                juegoPausado = true;
                alert("☣️ ¡VICTORIA ABSOLUTA! Has extinguido toda la vida humana en el planeta.");
            } else if (curaProgreso >= 100) {
                juegoPausado = true;
                alert("🛡️ DERROTA: La cura fue completada y distribuida. Tu cepa ha sido erradicada.");
            } else if (totalInfectadosGlobal === 0 && personasVivasSanas > 0) {
                juegoPausado = true;
                alert("💀 CEPA EXTINGUIDA: El patógeno se quedó sin infectados activos. La cadena de transmisión se rompió.");
            }
        }
    </script>
